<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prestação de Contas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .app {
            padding: 24px;
        }

        .title-input {
            width: 100%;
            padding: 16px;
            font-size: 20px;
            font-weight: bold;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }

        .title-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form {
            display: grid;
            grid-template-columns: 1fr 1fr auto auto;
            gap: 8px;
            margin-bottom: 20px;
        }

        .form input {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .btn-primary {
            background: #10b981;
            color: white;
        }

        .btn-primary:hover {
            background: #059669;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }

        .btn-pdf {
            background: #3b82f6;
            color: white;
            width: 100%;
            padding: 16px;
            font-size: 16px;
            margin: 20px 0;
        }

        .btn-pdf:hover {
            background: #2563eb;
        }

        .table-container {
            max-height: 400px;
            overflow-y: auto;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f3f4f6;
            padding: 12px;
            position: sticky;
            top: 0;
            z-index: 10;
            font-weight: 600;
            color: #374151;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
            text-align: center;
        }

        .remove-btn {
            background: #fee2e2;
            color: #ef4444;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .remove-btn:hover {
            background: #ef4444;
            color: white;
        }

        .receita-row {
            background-color: #f0fdf4;
        }

        .despesa-row {
            background-color: #fef2f2;
        }

        .totals {
            background: #f3f4f6;
            padding: 16px;
            border-radius: 12px;
            display: flex;
            justify-content: space-around;
            font-weight: 600;
        }

        .total-item {
            text-align: center;
        }

        .total-label {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .total-value {
            font-size: 20px;
            color: #374151;
        }

        .saldo-positivo {
            color: #10b981;
        }

        .saldo-negativo {
            color: #ef4444;
        }

        @media (max-width: 768px) {
            .form {
                grid-template-columns: 1fr;
            }
            
            .app {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app">
            <input type="text" id="titulo" class="title-input" value="PRESTAÇÃO DE CONTA FEVEREIRO 2026">
            
            <div class="form">
                <input type="text" id="descricao" placeholder="Descrição">
                <input type="number" id="valor" placeholder="Valor" step="0.01">
                <button class="btn btn-primary" onclick="adicionarReceita()">➕ Receita</button>
                <button class="btn btn-danger" onclick="adicionarDespesa()">➖ Despesa</button>
            </div>

            <div class="table-container">
                <table id="tabela">
                    <thead>
                        <tr>
                            <th style="width: 50px"></th>
                            <th>Descrição</th>
                            <th>Receita (R$)</th>
                            <th>Despesa (R$)</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-body">
                    </tbody>
                </table>
            </div>

            <button class="btn btn-pdf" onclick="gerarPDF()">📄 GERAR PDF</button>

            <div class="totals">
                <div class="total-item">
                    <div class="total-label">Total Receitas</div>
                    <div class="total-value" id="total-receitas">R$ 0,00</div>
                </div>
                <div class="total-item">
                    <div class="total-label">Total Despesas</div>
                    <div class="total-value" id="total-despesas">R$ 0,00</div>
                </div>
                <div class="total-item">
                    <div class="total-label">Saldo</div>
                    <div class="total-value" id="saldo">R$ 0,00</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    
    <script>
        // Estado da aplicação
        let receitas = [];
        let despesas = [];

        // Elementos do DOM
        const tabelaBody = document.getElementById('tabela-body');
        const descricaoInput = document.getElementById('descricao');
        const valorInput = document.getElementById('valor');
        const tituloInput = document.getElementById('titulo');

        // Formata valor para exibição
        function formatarValor(valor) {
            return valor.toFixed(2).replace('.', ',');
        }

        // Atualiza a tabela e os totais
        function atualizarTabela() {
            // Limpa a tabela
            tabelaBody.innerHTML = '';

            // Adiciona receitas
            receitas.forEach((item, index) => {
                const row = document.createElement('tr');
                row.className = 'receita-row';
                row.innerHTML = `
                    <td><button class="remove-btn" onclick="removerReceita(${index})">✕</button></td>
                    <td>${item.descricao}</td>
                    <td>R$ ${formatarValor(item.valor)}</td>
                    <td>-</td>
                `;
                tabelaBody.appendChild(row);
            });

            // Adiciona despesas
            despesas.forEach((item, index) => {
                const row = document.createElement('tr');
                row.className = 'despesa-row';
                row.innerHTML = `
                    <td><button class="remove-btn" onclick="removerDespesa(${index})">✕</button></td>
                    <td>${item.descricao}</td>
                    <td>-</td>
                    <td>R$ ${formatarValor(item.valor)}</td>
                `;
                tabelaBody.appendChild(row);
            });

            // Calcula totais
            const totalReceitas = receitas.reduce((acc, item) => acc + item.valor, 0);
            const totalDespesas = despesas.reduce((acc, item) => acc + item.valor, 0);
            const saldo = totalReceitas - totalDespesas;

            // Atualiza totais
            document.getElementById('total-receitas').textContent = `R$ ${formatarValor(totalReceitas)}`;
            document.getElementById('total-despesas').textContent = `R$ ${formatarValor(totalDespesas)}`;
            
            const saldoElement = document.getElementById('saldo');
            saldoElement.textContent = `R$ ${formatarValor(Math.abs(saldo))}`;
            saldoElement.className = `total-value ${saldo >= 0 ? 'saldo-positivo' : 'saldo-negativo'}`;
            if (saldo < 0) {
                saldoElement.textContent = `-R$ ${formatarValor(Math.abs(saldo))}`;
            }
        }

        // Adicionar receita
        function adicionarReceita() {
            const descricao = descricaoInput.value.trim();
            const valor = parseFloat(valorInput.value);

            if (!descricao || isNaN(valor) || valor <= 0) {
                alert('Por favor, preencha a descrição e um valor válido!');
                return;
            }

            receitas.push({ descricao, valor });
            limparCampos();
            atualizarTabela();
        }

        // Adicionar despesa
        function adicionarDespesa() {
            const descricao = descricaoInput.value.trim();
            const valor = parseFloat(valorInput.value);

            if (!descricao || isNaN(valor) || valor <= 0) {
                alert('Por favor, preencha a descrição e um valor válido!');
                return;
            }

            despesas.push({ descricao, valor });
            limparCampos();
            atualizarTabela();
        }

        // Remover receita
        function removerReceita(index) {
            receitas.splice(index, 1);
            atualizarTabela();
        }

        // Remover despesa
        function removerDespesa(index) {
            despesas.splice(index, 1);
            atualizarTabela();
        }

        // Limpar campos do formulário
        function limparCampos() {
            descricaoInput.value = '';
            valorInput.value = '';
        }

        // Gerar PDF
        function gerarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // Título
            doc.setFontSize(16);
            doc.text(tituloInput.value, 14, 20);
            
            // Data de geração
            doc.setFontSize(10);
            doc.text(`Gerado em: ${new Date().toLocaleDateString('pt-BR')}`, 14, 28);
            
            // Receitas
            doc.setFontSize(14);
            doc.text('RECEITAS:', 14, 40);
            
            let y = 48;
            doc.setFontSize(11);
            receitas.forEach(item => {
                doc.text(`${item.descricao} - R$ ${formatarValor(item.valor)}`, 14, y);
                y += 8;
            });
            
            // Despesas
            y += 5;
            doc.setFontSize(14);
            doc.text('DESPESAS:', 14, y);
            
            y += 8;
            doc.setFontSize(11);
            despesas.forEach(item => {
                doc.text(`${item.descricao} - R$ ${formatarValor(item.valor)}`, 14, y);
                y += 8;
            });
            
            // Totais
            y += 10;
            const totalReceitas = receitas.reduce((acc, item) => acc + item.valor, 0);
            const totalDespesas = despesas.reduce((acc, item) => acc + item.valor, 0);
            const saldo = totalReceitas - totalDespesas;
            
            doc.setFontSize(12);
            doc.setFont(undefined, 'bold');
            doc.text(`Total Receitas: R$ ${formatarValor(totalReceitas)}`, 14, y);
            y += 8;
            doc.text(`Total Despesas: R$ ${formatarValor(totalDespesas)}`, 14, y);
            y += 8;
            doc.text(`Saldo: R$ ${formatarValor(Math.abs(saldo))} ${saldo < 0 ? '(Negativo)' : ''}`, 14, y);
            
            // Salvar PDF
            doc.save(`${tituloInput.value.replace(/ /g, '_')}.pdf`);
        }

        // Inicializa a tabela vazia
        atualizarTabela();
    </script>
</body>
</html>
