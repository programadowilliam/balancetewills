<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prestação de Contas</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <div class="app">
            <input type="text" id="titulo" class="title-input" value="PRESTAÇÃO DE CONTA FEVEREIRO 2026">
            
            <div class="form">
                <input type="text" id="descricao" placeholder="Descrição">
                <input type="number" id="valor" placeholder="Valor" step="0.01">
                <button class="btn btn-primary" onclick="adicionarReceita()">➕ Receita</button>
                <button class="btn btn-danger" onclick="adicionarDespesa()">➖ Despesa</button>
            </div>

            <div class="table-container">
                <table id="tabela">
                    <thead>
                        <tr>
                            <th style="width: 50px"></th>
                            <th>Descrição</th>
                            <th>Receita (R$)</th>
                            <th>Despesa (R$)</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-body">
                    </tbody>
                </table>
            </div>

            <button class="btn btn-pdf" onclick="gerarPDF()">📄 GERAR PDF</button>

            <div class="totals">
                <div class="total-item">
                    <div class="total-label">Total Receitas</div>
                    <div class="total-value" id="total-receitas">R$ 0,00</div>
                </div>
                <div class="total-item">
                    <div class="total-label">Total Despesas</div>
                    <div class="total-value" id="total-despesas">R$ 0,00</div>
                </div>
                <div class="total-item">
                    <div class="total-label">Saldo</div>
                    <div class="total-value" id="saldo">R$ 0,00</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="index.sj"></script>
</body>
</html>
